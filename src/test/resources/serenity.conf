serenity {
  project.name = "Banco Pichincha - Prueba Tecnica OpenCart"
  test.root = "co.com.bancopichincha.opencart.features"
  take.screenshots = FOR_EACH_ACTION
  restart.browser.for.each = NEVER
}

webdriver {
  driver = chrome
  base.url = "http://opencart.abstracta.us/"
  autoclose = true
  capabilities {
    acceptInsecureCerts = true
  }
}

chrome.switches = "--ignore-certificate-errors;--start-maximized;--disable-search-engine-choice-screen"
headless.mode = false
